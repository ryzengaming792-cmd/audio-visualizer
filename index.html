<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic Web Audio Visualizer</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Canvas for Static Circuit Board -->
    <canvas id="bgCanvas"></canvas>
    
    <!-- Visualizer Canvas for Lightning Pulses -->
    <canvas id="visualizerCanvas"></canvas>

    <!-- Circuit Text Accents -->
    <div class="circuit-text accent-top-right">/// 03</div>
    <div class="circuit-text accent-mid-right">
        <div class="bracket">[</div>
        <span>RDXN.03</span>
        <div class="bracket">]</div>
    </div>
    
    <!-- Central Logo (No visualizer rings blocking it) -->
    <div class="logo-container">
        <img src="logo.png" alt="Neon Phoenix" class="center-logo">
        <div class="logo-text">RADEON GAMING</div>
    </div>

    <!-- UI Overlay (Fades out when inactive) -->
    <div class="ui-overlay" id="uiOverlay">
        <!-- Top Header -->
        <header class="top-header">
            <div class="nav-left">
                <span class="glitch-text" data-text="LEVEL UP">LEVEL UP</span>
            </div>
            <div class="nav-center">
                <div class="status-bar">
                    <div class="status-indicator"></div>
                    <span>SYSTEM ONLINE</span>
                </div>
            </div>
            <div class="nav-right">
                <span class="cyber-accent">STAY SHARP</span>
            </div>
        </header>

        <!-- Integration Panel -->
        <aside class="integration-panel">
            <button class="btn btn-spotify">
                <svg viewBox="0 0 24 24" class="icon" fill="currentColor">
                    <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.54.66.3 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.24 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
                Connect Spotify
            </button>
            <div class="divider"><span>OR</span></div>
            <label for="audioUpload" class="btn btn-upload">
                <svg viewBox="0 0 24 24" class="icon" fill="currentColor">
                    <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/>
                </svg>
                Upload MP3
            </label>
            <input type="file" id="audioUpload" accept="audio/mp3,audio/wav,audio/ogg" style="display: none;">
        </aside>

        <!-- Bottom Controls -->
        <footer class="bottom-controls">
            <div class="track-info">
                <div class="track-title" id="trackTitle">No Track Loaded</div>
                <div class="track-artist" id="trackArtist">System Ready</div>
            </div>
            
            <div class="player-center">
                <div class="controls">
                    <button class="ctrl-btn play-btn" id="btnPlayPause">
                        <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                </div>
                <div class="progress-container">
                    <span class="time" id="timeCurrent">0:00</span>
                    <div class="progress-bar-bg" id="progressBarBg">
                        <div class="progress-bar-fill" id="progressBarFill"></div>
                    </div>
                    <span class="time" id="timeTotal">0:00</span>
                </div>
            </div>
            
            <div class="volume-control">
                <svg viewBox="0 0 24 24" class="icon" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
